{% extends "wagtailadmin/base.html" %}
{% load wagtailadmin_tags %}

{% block extra_css %}
<style>
    .module-config-container {
        max-width: 700px;
        margin: 0 auto;
        padding: 2rem;
    }
    
    .module-config-header {
        margin-bottom: 2rem;
    }
    
    .module-config-header h1 {
        color: #4a6b3a;
        margin-bottom: 0.5rem;
    }
    
    .module-card {
        background: #fff;
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 1rem;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    
    .module-list {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    
    .module-item {
        display: flex;
        align-items: center;
        padding: 0.75rem 0;
        border-bottom: 1px solid #eee;
    }
    
    .module-item:last-child {
        border-bottom: none;
    }
    
    .module-toggle {
        width: 20px;
        height: 20px;
        margin-right: 1rem;
    }
    
    .module-label {
        font-weight: 500;
    }
    
    .save-btn {
        margin-top: 1.5rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="module-config-container">
    <div class="module-config-header">
        <h1>Module Configuration</h1>
        <p>Enable or disable ERP modules for your company.</p>
    </div>

    <form method="POST">
        {% csrf_token %}
        
        <div class="module-card">
            <ul class="module-list">
                {% for module_slug, module_name in modules %}
                <li class="module-item">
                    <input type="checkbox" 
                           name="module_{{ module_slug }}" 
                           id="module_{{ module_slug }}"
                           class="module-toggle form-check-input"
                           {% if enabled|default:False and enabled.module_slug %}checked{% endif %}>
                    <label for="module_{{ module_slug }}" class="module-label">
                        {{ module_name }}
                    </label>
                </li>
                {% endfor %}
            </ul>
        </div>

        <button type="submit" class="btn btn-primary save-btn">
            <i class="bi bi-check-circle me-2"></i>
            Save Configuration
        </button>
    </form>
</div>
{% endblock %}
