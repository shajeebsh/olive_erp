<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WagtailERP{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }

        .sidebar {
            min-height: 100vh;
            background: #212529;
            color: white;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar p-3">
                <h3>Olive_ERP</h3>
                <ul class="nav flex-column mt-4">
                    <li class="nav-item"><a class="nav-link text-white" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="/dashboard/">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="/crm/">CRM</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="/inventory/">Inventory</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="/finance/">Finance</a></li>
                </ul>
            </nav>
            <main class="col-md-10 ms-sm-auto p-4">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>

</html>
