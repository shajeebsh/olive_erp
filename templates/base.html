{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Olive ERP{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/olive-theme.css' %}">
    <link rel="stylesheet" href="{% static 'css/accounting.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/mobile.css' %}">
</head>
<body>
    <div class="d-flex">
        {% include 'includes/sidebar.html' %}
        <div class="content-area">
            <div id="topbar" class="d-flex justify-content-between align-items-center w-100 p-3 bg-white shadow-sm mb-4">
                {% include 'includes/topbar.html' %}
            </div>
            <main class="container-fluid p-4">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.5"></script>
    <script src="{% static 'js/sidebar.js' %}"></script>
    <script src="{% static 'js/shortcuts.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
