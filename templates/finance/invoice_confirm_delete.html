{% extends 'base.html' %}

{% block title %}Delete Invoice | Olive ERP{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 text-center">
                <i class="bi bi-exclamation-triangle-fill text-danger h1 mb-3 d-block"></i>
                <h3>Delete Invoice</h3>
                <p class="text-muted mb-4">Are you sure you want to delete invoice <strong>{{ invoice.invoice_number }}</strong>? This action cannot be undone.</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'finance:invoices' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                        <button type="submit" class="btn btn-danger px-4">Delete Permanently</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
