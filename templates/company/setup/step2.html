{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Step 2: Select Your Country</h4>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}

                        <div class="form-group mb-4">
                            <label class="form-label fw-bold">Country of Operation</label>
                            <select name="country" class="form-select" required>
                                {% for country in countries %}
                                    <option value="{{ country.code }}"
                                            {% if country.code == selected_country %}selected{% endif %}>
                                        {{ country.name }} ({{ country.currency }})
                                    </option>
                                {% endfor %}
                            </select>
                            <small class="text-muted d-block mt-1">
                                Tax rules and compliance will be configured for this country
                            </small>
                        </div>

                        <div class="d-flex justify-content-end">
                            <button type="submit" class="btn btn-primary">Next: Tax Configuration</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
