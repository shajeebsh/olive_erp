{% extends 'base.html' %}

{% block title %}Apply for Leave | Olive ERP{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3">
                <h2 class="h5 mb-0">Apply for Leave</h2>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Leave Type</label>
                        {{ form.leave_type }}
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Start Date</label>
                            {{ form.start_date }}
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">End Date</label>
                            {{ form.end_date }}
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Reason</label>
                        {{ form.reason }}
                    </div>

                    <div class="d-flex justify-content-between pt-3 border-top">
                        <a href="{% url 'hr:leave' %}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4">Submit Request</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
