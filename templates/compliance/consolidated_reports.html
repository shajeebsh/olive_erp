{% extends 'base.html' %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12">
            <div class="card shadow">
                <div class="card-header">
                    <h4>🌍 Consolidated Multi-Country Reports</h4>
                </div>
                <div class="card-body">
                    <!-- Report Type Selector -->
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label>Report Type</label>
                            <select class="form-select" id="reportType">
                                <option value="vat">VAT/GST Summary</option>
                                <option value="tax">Tax Liability by Country</option>
                                <option value="filing">Filing Status</option>
                                <option value="payment">Tax Payments</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label>Period</label>
                            <select class="form-select" id="reportPeriod">
                                <option value="q1">Q1 2025</option>
                                <option value="q2">Q2 2025</option>
                                <option value="q3">Q3 2025</option>
                                <option value="q4">Q4 2025</option>
                                <option value="year">Full Year 2025</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label>&nbsp;</label>
                            <button class="btn btn-primary d-block" onclick="generateConsolidatedReport()">
                                Generate Report
                            </button>
                        </div>
                    </div>
                    
                    <!-- Report Results -->
                    <div id="reportResults">
                        <!-- Populated by JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Transfer Pricing Dashboard -->
    <div class="row">
        <div class="col-12">
            <div class="card shadow">
                <div class="card-header">
                    <h5>🔄 Inter-Company Transactions</h5>
                </div>
                <div class="card-body">
                    <table class="table" id="transferPricingTable">
                        <thead>
                            <tr>
                                <th>From Country</th>
                                <th>To Country</th>
                                <th>Transaction Type</th>
                                <th>Amount</th>
                                <th>Mark-up %</th>
                                <th>Arm's Length Range</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function generateConsolidatedReport() {
    const type = document.getElementById('reportType').value;
    const period = document.getElementById('reportPeriod').value;
    
    fetch(`/api/compliance/consolidated/?type=${type}&period=${period}`)
        .then(response => response.json())
        .then(data => {
            renderConsolidatedReport(data);
        });
}

function renderConsolidatedReport(data) {
    const container = document.getElementById('reportResults');
    
    if (data.type === 'vat') {
        container.innerHTML = `
            <table class="table">
                <thead>
                    <tr>
                        <th>Country</th>
                        <th>Output VAT</th>
                        <th>Input VAT</th>
                        <th>Net Payable</th>
                        <th>Due Date</th>
                    </tr>
                </thead>
                <tbody>
                    ${data.countries.map(c => `
                        <tr>
                            <td>${c.flag} ${c.name}</td>
                            <td>${c.currency} ${c.output_vat}</td>
                            <td>${c.currency} ${c.input_vat}</td>
                            <td><strong>${c.currency} ${c.net_payable}</strong></td>
                            <td>${c.due_date}</td>
                        </tr>
                    `).join('')}
                </tbody>
                <tfoot>
                    <tr class="table-primary">
                        <th>Total</th>
                        <th>${data.total.output_vat}</th>
                        <th>${data.total.input_vat}</th>
                        <th>${data.total.net_payable}</th>
                        <th></th>
                    </tr>
                </tfoot>
            </table>
        `;
    }
}
</script>
{% endblock %}
