{% extends "base.html" %}
{% block title %}PAYE/PRSI Return{% endblock %}
{% block content %}
<div class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Employer PAYE/PRSI Return (PMT) <span class="badge bg-success fs-6 align-middle ms-2">IE</span></h2>
    <span class="badge bg-secondary fs-6">Draft</span>
  </div>

  <div class="card border-0 shadow-sm mb-4">
    <div class="card-header bg-white fw-semibold">Payroll Extract for {{ period }}</div>
    <div class="card-body">
      <div class="row align-items-center mb-3">
        <label class="col-sm-4 col-form-label">Total Gross Payroll:</label>
        <div class="col-sm-4">
          <div class="input-group">
            <span class="input-group-text bg-light text-muted">€</span>
            <input type="text" class="form-control bg-light text-muted" value="{{ gross_pay }}" readonly>
          </div>
        </div>
      </div>
      
      <h5 class="mt-4 mb-3 border-bottom pb-2 text-secondary">Statutory Deductions (Revenue)</h5>
      <div class="row align-items-center mb-2">
        <label class="col-sm-4 col-form-label">Income Tax (PAYE):</label>
        <div class="col-sm-4">
          <div class="input-group">
            <span class="input-group-text">€</span>
            <input type="text" class="form-control" value="{{ paye_deducted }}" readonly>
          </div>
        </div>
      </div>
      <div class="row align-items-center mb-2">
        <label class="col-sm-4 col-form-label">PRSI (Employee):</label>
        <div class="col-sm-4">
          <div class="input-group">
            <span class="input-group-text">€</span>
            <input type="text" class="form-control" value="{{ prsi_employee }}" readonly>
          </div>
        </div>
      </div>
      <div class="row align-items-center mb-2">
        <label class="col-sm-4 col-form-label">PRSI (Employer):</label>
        <div class="col-sm-4">
          <div class="input-group">
            <span class="input-group-text">€</span>
            <input type="text" class="form-control" value="{{ prsi_employer }}" readonly>
          </div>
        </div>
      </div>
      <div class="row align-items-center mb-3">
        <label class="col-sm-4 col-form-label">Universal Social Charge (USC):</label>
        <div class="col-sm-4">
          <div class="input-group">
            <span class="input-group-text">€</span>
            <input type="text" class="form-control" value="{{ usc_deducted }}" readonly>
          </div>
        </div>
      </div>
      
      <hr>
      <div class="row align-items-center">
        <label class="col-sm-4 col-form-label fw-bold text-danger">Total Remittance Due to ROS:</label>
        <div class="col-sm-4">
          <div class="input-group">
            <span class="input-group-text bg-light fw-bold text-danger">€</span>
            <input type="text" class="form-control bg-light fw-bold text-danger" value="{{ total_due|floatformat:2 }}" readonly>
          </div>
        </div>
      </div>
      
      <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top">
        <button type="submit" class="btn btn-outline-secondary">Save as Draft</button>
        <a href="#" class="btn btn-outline-danger" title="Integration pending" data-bs-toggle="tooltip">File to ROS (PMT)</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
