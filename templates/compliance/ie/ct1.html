{% extends "base.html" %}
{% block title %}CT1 Return{% endblock %}
{% block content %}
<div class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">CT1 Corporation Tax Return <span class="badge bg-success fs-6 align-middle ms-2">IE</span></h2>
    <span class="badge bg-secondary fs-6">Draft</span>
  </div>

  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body">
      <form method="get" class="row gx-3 gy-2 align-items-center mb-0">
        <div class="col-sm-4">
          <label class="visually-hidden" for="periodSelect">Accounting Period</label>
          <select class="form-select" id="periodSelect" name="period" onchange="this.form.submit()">
            {% for p in periods %}
            <option value="{{ p }}" {% if period == p %}selected{% endif %}>Year {{ p }}</option>
            {% endfor %}
          </select>
        </div>
      </form>
    </div>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-header bg-white fw-semibold">CT1 Computation Details</div>
    <div class="card-body">
      <form method="post" id="ct1Form">
        {% csrf_token %}
        <div class="row">
          <div class="col-md-8 col-lg-6">
            <h5 class="mb-4 text-secondary border-bottom pb-2">Trading Profits</h5>
            
            <div class="row align-items-center mb-3">
              <label for="trading_income" class="col-sm-5 col-form-label">Adjusted Trading Profit:</label>
              <div class="col-sm-7">
                <div class="input-group">
                  <span class="input-group-text">€</span>
                  <input type="number" step="0.01" class="form-control ct-calc" id="trading_income" name="trading_income" value="{{ trading_income }}">
                </div>
              </div>
            </div>

            <div class="row align-items-center mb-3">
              <label for="capital_allowances" class="col-sm-5 col-form-label">Less Capital Allowances:</label>
              <div class="col-sm-7">
                <div class="input-group">
                  <span class="input-group-text">€</span>
                  <input type="number" step="0.01" class="form-control ct-calc" id="capital_allowances" name="capital_allowances" value="{{ capital_allowances }}">
                </div>
              </div>
            </div>

            <hr>

            <div class="row align-items-center mb-3">
              <label for="taxable_income" class="col-sm-5 col-form-label fw-bold">Net Taxable Profit:</label>
              <div class="col-sm-7">
                <div class="input-group">
                  <span class="input-group-text bg-light fw-bold">€</span>
                  <input type="number" step="0.01" class="form-control bg-light fw-bold" id="taxable_income" name="taxable_income" value="{{ taxable_income }}" readonly>
                </div>
              </div>
            </div>

            <div class="row align-items-center mb-4">
              <label for="corp_tax_payable" class="col-sm-5 col-form-label fw-bold text-danger">Corporation Tax (12.5%):</label>
              <div class="col-sm-7">
                <div class="input-group">
                  <span class="input-group-text bg-light text-danger fw-bold">€</span>
                  <input type="number" step="0.01" class="form-control bg-light text-danger fw-bold" id="corp_tax_payable" name="corp_tax_payable" value="{{ corp_tax_payable }}" readonly>
                </div>
              </div>
            </div>

          </div>
        </div>
        
        <div class="d-flex justify-content-end gap-2 mt-2 pt-3 border-top">
          <button type="submit" class="btn btn-outline-secondary">Save as Draft</button>
          <a href="#" class="btn btn-outline-danger" title="Integration pending" data-bs-toggle="tooltip">File to ROS</a>
          <button type="button" class="btn btn-primary" onclick="window.print()"><i class="bi bi-file-pdf"></i> Download PDF</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.ct-calc').forEach(el => {
    el.addEventListener('input', function() {
      const income = parseFloat(document.getElementById('trading_income').value) || 0;
      const allowances = parseFloat(document.getElementById('capital_allowances').value) || 0;
      
      let taxable = income - allowances;
      if (taxable < 0) taxable = 0; // Losses carried forward logic placeholder
      
      let tax = taxable * 0.125;
      
      document.getElementById('taxable_income').value = taxable.toFixed(2);
      document.getElementById('corp_tax_payable').value = tax.toFixed(2);
    });
  });
});
</script>
{% endblock %}
