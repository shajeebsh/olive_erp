{% extends "base.html" %}
{% block title %}VAT3 Return{% endblock %}
{% block content %}
<div class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">VAT3 Return Formulation <span class="badge bg-success fs-6 align-middle ms-2">IE</span></h2>
    <span class="badge bg-secondary fs-6">Draft</span>
  </div>

  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body">
      <form method="get" class="row gx-3 gy-2 align-items-center mb-0">
        <div class="col-sm-4">
          <label class="visually-hidden" for="periodSelect">Period</label>
          <select class="form-select" id="periodSelect" name="period" onchange="this.form.submit()">
            <option value="">Select Return Period...</option>
            {% for p in periods %}
            <option value="{{ p }}" {% if period == p %}selected{% endif %}>{{ p }}</option>
            {% endfor %}
          </select>
        </div>
      </form>
    </div>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-header bg-white fw-semibold">Declaration Details</div>
    <div class="card-body">
      <form method="post" id="vat3Form">
        {% csrf_token %}
        <div class="row g-4">
          <!-- VAT on Sales & Purchases -->
          <div class="col-md-6">
            <h5 class="mb-3 text-secondary border-bottom pb-2">Output & Input VAT</h5>
            <div class="row align-items-center mb-3">
              <label for="T1" class="col-sm-5 col-form-label">T1 VAT on Sales:</label>
              <div class="col-sm-7">
                <div class="input-group">
                  <span class="input-group-text">€</span>
                  <input type="number" step="0.01" class="form-control vat-calc" id="T1" name="T1" value="{{ boxes.T1 }}">
                </div>
              </div>
            </div>
            <div class="row align-items-center mb-3">
              <label for="T2" class="col-sm-5 col-form-label">T2 VAT on Purchases:</label>
              <div class="col-sm-7">
                <div class="input-group">
                  <span class="input-group-text">€</span>
                  <input type="number" step="0.01" class="form-control vat-calc" id="T2" name="T2" value="{{ boxes.T2 }}">
                </div>
              </div>
            </div>
            <div class="row align-items-center mb-3">
              <label for="T3" class="col-sm-5 col-form-label fw-bold">T3 VAT Payable:</label>
              <div class="col-sm-7">
                <div class="input-group">
                  <span class="input-group-text bg-light text-danger">€</span>
                  <input type="number" step="0.01" class="form-control bg-light text-danger fw-bold" id="T3" name="T3" value="{{ boxes.T3 }}" readonly>
                </div>
              </div>
            </div>
            <div class="row align-items-center mb-3">
              <label for="T4" class="col-sm-5 col-form-label fw-bold">T4 VAT Repayable:</label>
              <div class="col-sm-7">
                <div class="input-group">
                  <span class="input-group-text bg-light text-success">€</span>
                  <input type="number" step="0.01" class="form-control bg-light text-success fw-bold" id="T4" name="T4" value="{{ boxes.T4 }}" readonly>
                </div>
              </div>
            </div>
          </div>

          <!-- Goods Details -->
          <div class="col-md-6">
            <h5 class="mb-3 text-secondary border-bottom pb-2">Value of Goods & EU Trade</h5>
            <div class="row align-items-center mb-3">
              <label for="E1" class="col-sm-5 col-form-label">E1 Intracom Sales:</label>
              <div class="col-sm-7">
                <div class="input-group">
                  <span class="input-group-text">€</span>
                  <input type="number" step="0.01" class="form-control" id="E1" name="E1" value="0.00">
                </div>
              </div>
            </div>
            <div class="row align-items-center mb-3">
              <label for="E2" class="col-sm-5 col-form-label">E2 Intracom Purchases:</label>
              <div class="col-sm-7">
                <div class="input-group">
                  <span class="input-group-text">€</span>
                  <input type="number" step="0.01" class="form-control" id="E2" name="E2" value="0.00">
                </div>
              </div>
            </div>
          </div>
        </div>
        
        <hr class="mt-4 mb-4">
        <div class="d-flex justify-content-end gap-2">
          <button type="submit" class="btn btn-outline-secondary">Save as Draft</button>
          <a href="#" class="btn btn-outline-danger" title="Integration pending" data-bs-toggle="tooltip">Submit to Revenue</a>
          <button type="button" class="btn btn-primary" onclick="window.print()"><i class="bi bi-file-pdf"></i> Download PDF</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.vat-calc').forEach(el => {
    el.addEventListener('input', function() {
      const t1 = parseFloat(document.getElementById('T1').value) || 0;
      const t2 = parseFloat(document.getElementById('T2').value) || 0;
      let diff = t1 - t2;
      if (diff > 0) {
        document.getElementById('T3').value = diff.toFixed(2);
        document.getElementById('T4').value = "0.00";
      } else {
        document.getElementById('T3').value = "0.00";
        document.getElementById('T4').value = Math.abs(diff).toFixed(2);
      }
    });
  });
});
</script>
{% endblock %}
