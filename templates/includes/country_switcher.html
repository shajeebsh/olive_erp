<div class="dropdown" id="countrySwitcher">
    <button class="btn btn-light dropdown-toggle" type="button" id="countryDropdown" data-bs-toggle="dropdown">
        <span id="currentCountryFlag">🌍</span>
        <span id="currentCountryName">All Countries</span>
    </button>
    <ul class="dropdown-menu" aria-labelledby="countryDropdown">
        <li>
            <a class="dropdown-item" href="#" onclick="switchCountry('all')">
                🌍 All Countries
            </a>
        </li>
        <li><hr class="dropdown-divider"></li>
        <li>
            <a class="dropdown-item" href="#" onclick="switchCountry('IE')">
                🇮🇪 Ireland
            </a>
        </li>
        <li>
            <a class="dropdown-item" href="#" onclick="switchCountry('GB')">
                🇬🇧 United Kingdom
            </a>
        </li>
        <li>
            <a class="dropdown-item" href="#" onclick="switchCountry('IN')">
                🇮🇳 India
            </a>
        </li>
        <li>
            <a class="dropdown-item" href="#" onclick="switchCountry('AE')">
                🇦🇪 UAE
            </a>
        </li>
    </ul>
</div>

<script>
function switchCountry(countryCode) {
    // Update UI
    const flags = {
        'all': '🌍 All Countries',
        'IE': '🇮🇪 Ireland',
        'GB': '🇬🇧 United Kingdom',
        'IN': '🇮🇳 India',
        'AE': '🇦🇪 UAE'
    };
    
    document.getElementById('currentCountryFlag').textContent = flags[countryCode].split(' ')[0];
    document.getElementById('currentCountryName').textContent = flags[countryCode].substring(2);
    
    // Store in session
    fetch('/api/user/set-country/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]')?.value
        },
        body: JSON.stringify({country: countryCode})
    });
    
    // Reload current page with country context
    window.location.reload();
}
</script>
